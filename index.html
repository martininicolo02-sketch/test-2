<!DOCTYPE html> 
<html lang="it"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>QR Video Personalizzato - Cloud Automatico</title> 

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script> 

<style> 
body { 
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
text-align: center; 
background: linear-gradient(135deg, #f0f4f8 0%, #e6fffa 100%); 
padding: 40px 20px; 
color: #333; 
min-height: 100vh;
box-sizing: border-box;
} 

.container { 
max-width: 600px; 
margin: 0 auto; 
background: white; 
padding: 30px; 
border-radius: 20px; 
box-shadow: 0 8px 30px rgba(74, 144, 226, 0.1); 
border: 2px solid #b3d4fc; 
} 

h2 { 
color: #4A90E2; 
margin-bottom: 20px; 
font-weight: 800;
letter-spacing: 0.5px;
} 

.input-group { 
margin-bottom: 15px; 
text-align: left; 
} 

label { 
display: block; 
font-weight: bold; 
margin-bottom: 5px; 
font-size: 14px; 
color: #4A90E2; 
} 

input[type="file"], input[type="text"] { 
width: 100%; 
padding: 12px; 
font-size: 16px; 
border: 2px solid #b3d4fc; 
border-radius: 12px; 
box-sizing: border-box; 
background-color: #fcfdfe;
transition: border-color 0.2s;
} 

input[type="text"]:focus {
border-color: #4A90E2;
outline: none;
}

.color-picker-container {
display: flex;
align-items: center;
gap: 15px;
}

input[type="color"] {
-webkit-appearance: none;
border: none;
width: 50px;
height: 50px;
border-radius: 12px;
cursor: pointer;
background: none;
padding: 0;
}

input[type="color"]::-webkit-color-swatch-wrapper {
padding: 0;
}

input[type="color"]::-webkit-color-swatch {
border: 2px solid #b3d4fc;
border-radius: 12px;
}

.btn-container { 
margin-top: 20px; 
} 

button { 
padding: 12px 24px; 
font-size: 16px; 
font-weight: bold; 
cursor: pointer; 
border: none; 
border-radius: 12px; 
transition: all 0.2s; 
margin: 5px; 
} 

.btn-generate { 
background-color: #4A90E2; 
color: white; 
box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
} 

.btn-generate:hover { 
background-color: #357ABD; 
transform: scale(1.03); 
} 

.btn-generate:disabled { 
background-color: #ccc; 
box-shadow: none;
cursor: not-allowed; 
} 

.btn-download { 
background-color: #4ed8da; 
color: white; 
box-shadow: 0 4px 12px rgba(78, 216, 218, 0.3);
} 

.btn-download:hover { 
background-color: #3cbabb; 
transform: scale(1.03);
} 

#statusText { 
margin-top: 15px; 
font-weight: bold; 
color: #555; 
} 

#canvasContainer { 
margin-top: 30px; 
display: flex; 
justify-content: center; 
} 
canvas { 
max-width: 100%; 
width: 450px; 
height: auto; 
border-radius: 15px; 
background: white; 
box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
} 
</style> 
</head> 
<body> 

<div class="container"> 
<h2>PERSONALIZZA IL TUO QR PUBBLICO</h2> 

<div class="input-group"> 
<label for="videoFileInput">Seleziona il Video dal PC:</label> 
<input type="file" id="videoFileInput" accept="video/*"> 
</div> 

<div class="input-group"> 
<label for="logoInput">Carica un Logo Centrale (Opzionale):</label> 
<input type="file" id="logoInput" accept="image/*"> 
</div> 

<div class="input-group"> 
<label for="colorPicker">Scegli il Colore del QR Code:</label> 
<div class="color-picker-container">
<input type="color" id="colorPicker" value="#4A90E2" oninput="aggiornaInputTesto(this.value)"> 
<input type="text" id="colorHexInput" value="" placeholder="Scegli il colore del tuo qr... (ESADECIMALE)" oninput="aggiornaTavolozza(this.value)">
</div>
</div>

<div class="btn-container"> 
<button id="btnGen" class="btn-generate" onclick="caricaEGenera()">Carica e Genera QR</button> 
<button class="btn-download" onclick="scaricaQR()">Scarica PNG</button> 
</div> 

<div id="statusText"></div> 

<div id="canvasContainer"> 
<canvas id="qrCanvas" style="display:none;"></canvas> 
</div> 
</div> 

<script> 
function aggiornaInputTesto(colore) {
document.getElementById("colorHexInput").value = colore.toUpperCase();
}

function aggiornaTavolozza(valore) {
let hex = valore.trim();
if (hex.length === 6 && !hex.startsWith("#")) {
hex = "#" + hex;
}
if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
document.getElementById("colorPicker").value = hex;
}
}

async function caricaEGenera() { 
const videoFileInput = document.getElementById("videoFileInput"); 
const statusText = document.getElementById("statusText"); 
const btnGen = document.getElementById("btnGen"); 

if (!videoFileInput.files || !videoFileInput.files[0]) { 
alert("Per favore, seleziona prima un file video!"); 
return; 
} 

const videoFile = videoFileInput.files[0]; 

statusText.innerText = "Caricamento del video su internet in corso... attendi qualche secondo..."; 
btnGen.disabled = true; 

const formData = new FormData(); 
formData.append("file", videoFile); 
formData.append("upload_preset", "seen9o4j"); 

try { 
const response = await fetch("https://api.cloudinary.com/v1_1/dqoyha5ex/auto/upload", { 
method: "POST", 
body: formData 
}); 

const result = await response.json(); 

if (result.secure_url) { 
const linkVideoOnline = result.secure_url; 
statusText.innerText = "Video caricato! Generazione del QR definitivo..."; 

const fileInput = document.getElementById("logoInput"); 
if (fileInput.files && fileInput.files[0]) { 
const reader = new FileReader(); 
reader.onload = function(e) { 
const img = new Image(); 
img.onload = function() { 
disegnaQR(linkVideoOnline, img); 
statusText.innerText = "Fatto! Ora il QR è scansionabile da tutti."; 
btnGen.disabled = false; 
}; 
img.src = e.target.result; 
}; 
reader.readAsDataURL(fileInput.files[0]); 
} else { 
disegnaQR(linkVideoOnline, null); 
statusText.innerText = "Fatto! Ora il QR è scansionabile da tutti."; 
btnGen.disabled = false; 
} 
} else { 
statusText.innerText = "Errore durante il caricamento del video."; 
btnGen.disabled = false; 
alert("Impossibile caricare il file. Riprova o controlla la connessione."); 
} 
} catch (error) { 
console.error(error); 
statusText.innerText = "Errore di connessione al server cloud."; 
btnGen.disabled = false; 
} 
} 

function disegnaQR(url, logoImg) { 
const qr = qrcode(0, 'H'); 
qr.addData(url); 
qr.make(); 

const canvas = document.getElementById('qrCanvas'); 
const ctx = canvas.getContext('2d'); 
const count = qr.getModuleCount(); 
const cellSize = 32; 
const marginCells = 4; 
canvas.width = (count + marginCells) * cellSize; 
canvas.height = canvas.width; 
const offset = Math.floor((canvas.width - count * cellSize) / 2); 

ctx.imageSmoothingEnabled = true; 
ctx.imageSmoothingQuality = 'high'; 
ctx.fillStyle = '#ffffff'; 
ctx.fillRect(0, 0, canvas.width, canvas.height); 

let mainColor = document.getElementById("colorHexInput").value.trim();
if (mainColor.length === 6 && !mainColor.startsWith("#")) {
mainColor = "#" + mainColor;
}
if (!/^#[0-9A-Fa-f]{6}$/.test(mainColor)) {
mainColor = document.getElementById("colorPicker").value;
}

function disegnaOcchioContinuo(startX, startY) { 
const size7 = cellSize * 7; 
ctx.save(); 
ctx.fillStyle = mainColor; 
ctx.fillRect(startX, startY, size7, size7); 
ctx.fillStyle = "#ffffff"; 
ctx.fillRect(startX + cellSize, startY + cellSize, cellSize * 5, cellSize * 5); 
ctx.fillStyle = mainColor; 
ctx.fillRect(startX + cellSize * 2, startY + cellSize * 2, cellSize * 3, cellSize * 3); 
ctx.restore(); 
} 

disegnaOcchioContinuo(offset, offset); 
disegnaOcchioContinuo((count - 7) * cellSize + offset, offset); 
disegnaOcchioContinuo(offset, (count - 7) * cellSize + offset); 

for (let r = 0; r < count; r++) { 
for (let c = 0; c < count; c++) { 
const isEye = (r < 7 && c < 7) || (r < 7 && c >= count - 7) || (r >= count - 7 && c < 7); 
if (!isEye && qr.isDark(r, c)) { 
ctx.fillStyle = mainColor; 
const x = c * cellSize + offset; 
const y = r * cellSize + offset; 

ctx.save(); 
ctx.translate(x + cellSize / 2, y + cellSize * 0.48); 
const size = cellSize * 0.52; 
ctx.beginPath(); 
ctx.moveTo(0, -size * 0.2); 
ctx.bezierCurveTo(-size * 0.75, -size * 0.85, -size * 1.15, -size * 0.1, -size * 1.15, size * 0.35); 
ctx.bezierCurveTo(-size * 1.15, size * 0.8, -size * 0.45, size * 1.15, 0, size * 1.4); 
ctx.bezierCurveTo(size * 0.45, size * 1.15, size * 1.15, size * 0.8, size * 1.15, size * 0.35); 
ctx.bezierCurveTo(size * 1.15, -size * 0.1, size * 0.75, -size * 0.85, 0, -size * 0.2); 
ctx.closePath(); 
ctx.fill(); 
ctx.restore(); 
} 
} 
} 

if (logoImg) { 
const logoSize = canvas.width * 0.22; 
const logoX = (canvas.width - logoSize) / 2; 
const logoY = (canvas.height - logoSize) / 2; 
const padding = 15; 
ctx.fillStyle = "#ffffff"; 
ctx.fillRect(logoX - padding, logoY - padding, logoSize + (padding * 2), logoSize + (padding * 2)); 
ctx.drawImage(logoImg, logoX, logoY, logoSize, logoSize); 
} 
canvas.style.display = "block"; 
} 

function scaricaQR() { 
const canvas = document.getElementById('qrCanvas'); 
if (canvas.style.display === "none") return; 
const link = document.createElement('a'); 
link.download = 'qr-pubblico-universale.png'; 
link.href = canvas.toDataURL('image/png'); 
link.click(); 
} 
</script> 
</body> 
</html>
